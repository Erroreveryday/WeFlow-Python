[WeFlow]
# API 基础地址
base_url = http://127.0.0.1:5031

# 要监听的会话 ID (wxid 或群 ID)
talker = wxid_xxx

# 轮询间隔（秒）
polling_interval = 5

# 消息数量限制
limit = 1000

# 是否开启媒体导出
media = 0

# 开始时间配置
# start_mode = 1  # 方式1：指定日期，格式 YYYYMMDD
# start_mode = 2  # 方式2：往前推天数
start_mode = 2

# 方式1：指定日期，格式 YYYYMMDD
start_date = 20260201

# 方式2：往前推天数
start_days = 4

# 日志级别 (DEBUG, INFO, WARNING, ERROR)
log_level = INFO
