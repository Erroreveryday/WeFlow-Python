[WeFlow]
# API 基础地址
base_url = http://127.0.0.1:5031

# 要监听的会话 ID (wxid 或群 ID) 可在 WeFlow 中查看
talker = wxid_xxx

# 轮询间隔（秒）
polling_interval = 5

# 消息数量限制
limit = 1000

# 开始时间配置
# start_mode = 1  # 方式1：指定日期，格式 YYYYMMDD
# start_mode = 2  # 方式2：往前推天数
start_mode = 2

# 方式1：指定日期，格式 YYYYMMDD
start_date = 20260201

# 方式2：往前推天数
start_days = 4

# 日志级别 (DEBUG, INFO, WARNING, ERROR)
log_level = INFO

[AliyunAI]
# 阿里云API密钥
api_key = your_api_key_here

# AI模型
model = qwen-flash

# 发送给AI的历史消息数量，默认20
history_count = 20

[WeChat]
# 使用正确的微信安装路径
open_wechat = "C:\\Program Files\\Tencent\\Weixin\\Weixin.exe"

# 搜索会话快捷键（默认 Ctrl+F）
search_shortcut = ctrl+f

# 选中搜索结果快捷键（默认 Enter）
select_shortcut = enter

# 粘贴消息快捷键（默认 Ctrl+V）
paste_shortcut = ctrl+v

# 发送消息快捷键（默认 Ctrl+Enter）
send_shortcut = enter

# 隐藏/显示窗口快捷键（默认 Ctrl+Alt+W）
toggle_window_shortcut = ctrl+alt+w

# 目标会话名称（用于搜索）
target_session = 